  <style>
    .password-container {
      position: relative;
      width: 100%;
    }

    .password-container input {
      width: 100%;
      padding-right: 40px;
      box-sizing: border-box;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      color: #555;
      user-select: none;
    }

    .captcha-container {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #mensaje {

    </p>

    <input
      type="email"
      id="email"
      placeholder="Correo electrónico"
      autocomplete="email"
      required
    >

    <div class="password-container">
      <input
        type="password"
        id="password"
        placeholder="Contraseña"
        autocomplete="current-password"
        required
      >

      <span
        class="toggle-password"
        onclick="togglePassword('password', this)"
      >

    </div>

    <!-- CAPTCHA -->
